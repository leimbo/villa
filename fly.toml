app = "leimbo-villa"
primary_region = "sjc"

[build]

[env]
  DATA_DIR    = "/data"
  SCRIPTS_DIR = "/app/import-scripts"
  CREDS_DIR   = "/data/.credentials"
  FASTMCP_HOST = "0.0.0.0"
  FASTMCP_PORT = "8080"
  PORT         = "8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

#[[mounts]]
#  source      = "fitness_data"
#  destination = "/data"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
